apiVersion: v1
kind: Namespace
metadata:
  name: echo-http

---

kind: Deployment
apiVersion: apps/v1
metadata:
  name: echo-http
  namespace: echo-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-http
  template:
    metadata:
      labels:
        app: echo-http
    spec:
      containers:
        - name: echo-http
          image: mendhak/http-https-echo:17
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

---

kind: Service
apiVersion: v1
metadata:
  name: echo-http
  namespace: echo-http
spec:
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
  selector:
    app: echo-http

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-http
  namespace: echo-http
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - echo-http.sandbox.k8s.phl.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo-http
          port: 80
