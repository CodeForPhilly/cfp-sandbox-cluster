apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: envoy-gateway-system
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      # No hostname → matches anything. Per-app HTTPRoutes scope to their
      # own hostnames; the listener itself stays open so we don't have to
      # add a Gateway listener every time a project ships a new HTTPRoute.
      allowedRoutes:
        namespaces:
          from: All
