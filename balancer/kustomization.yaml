apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: balancer

resources:
  - manifests/namespace.yaml
  - manifests/deployment.yaml
  - manifests/service.yaml
  - manifests/gateway-listeners.yaml
  - manifests/httproute.yaml

images:
  - name: ghcr.io/codeforphilly/balancer-main/app
    newTag: "0.0.0-dev.20260211012449"

patches:
  - target:
      kind: ListenerSet
      name: balancer-listeners
    patch: |-
      - op: replace
        path: /spec/listeners/0/hostname
        value: sandbox.balancerproject.org
      - op: replace
        path: /spec/listeners/1/hostname
        value: sandbox.balancerproject.org
  - target:
      kind: HTTPRoute
      name: balancer
    patch: |-
      - op: add
        path: /spec/hostnames
        value: ["sandbox.balancerproject.org"]
  - target:
      kind: Namespace
      name: balancer
    patch: |-
      - op: replace
        path: /metadata/name
        value: dev
