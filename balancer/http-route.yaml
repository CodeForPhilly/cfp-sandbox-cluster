apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: balancer
  namespace: balancer
spec:
  parentRefs:
    - name: balancer-listeners
      kind: ListenerSet
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: balancer
          port: 80
