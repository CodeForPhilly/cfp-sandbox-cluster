apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prevention-point
  namespace: prevention-point
spec:
  hostnames:
    - prevention-point.sandbox.k8s.phl.io
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
    - name: prevention-point
  rules:
    - backendRefs:
        - name: prevention-point
          port: 80
