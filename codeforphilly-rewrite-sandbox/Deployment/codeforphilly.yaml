apiVersion: apps/v1
kind: Deployment
metadata:
  name: codeforphilly
  namespace: codeforphilly-rewrite-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: codeforphilly
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codeforphilly
    spec:
      containers:
        - env:
            - name: HOST
              value: 0.0.0.0
          envFrom:
            - configMapRef:
                name: codeforphilly-env
            - secretRef:
                name: codeforphilly-secrets
          image: ghcr.io/codeforphilly/codeforphilly-ng:sandbox
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          name: codeforphilly
          ports:
            - containerPort: 3001
              name: http
          readinessProbe:
            failureThreshold: 30
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - mountPath: /app/data
              name: data
            - mountPath: /app/private-storage
              name: private
            - mountPath: /etc/cfp-data-deploy-key
              name: deploy-key
              readOnly: true
      securityContext:
        fsGroup: 1000
      serviceAccountName: codeforphilly
      volumes:
        - emptyDir: {}
          name: data
        - name: private
          persistentVolumeClaim:
            claimName: codeforphilly-private
        - name: deploy-key
          secret:
            defaultMode: 256
            secretName: codeforphilly-data-deploy-key
