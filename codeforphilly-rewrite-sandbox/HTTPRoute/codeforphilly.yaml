apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: codeforphilly
  namespace: codeforphilly-rewrite-sandbox
spec:
  hostnames:
    - next-v2.codeforphilly.org
  parentRefs:
    - name: codeforphilly
  rules:
    - backendRefs:
        - name: codeforphilly
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
