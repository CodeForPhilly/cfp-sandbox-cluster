apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: codeforphilly
  namespace: codeforphilly-rewrite-sandbox
spec:
  hostnames:
    - codeforphilly-rewrite.codeforphilly.sandbox.k8s.phl.io
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
    - name: codeforphilly
  rules:
    - backendRefs:
        - name: codeforphilly
          port: 80
