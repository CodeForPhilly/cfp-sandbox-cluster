apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  name: metabase
  namespace: metabase
spec:
  gatewayClassName: eg
  listeners:
    - allowedRoutes:
        namespaces:
          from: Same
      hostname: metabase.sandbox.k8s.phl.io
      name: https
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - name: metabase-gw-tls
        mode: Terminate
