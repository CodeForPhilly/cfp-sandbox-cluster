apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: prevention-point
  namespace: prevention-point
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: prevention-point.sandbox.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: prevention-point-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prevention-point
  namespace: prevention-point
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
    - name: prevention-point
  hostnames:
    - prevention-point.sandbox.k8s.phl.io
  rules:
    - backendRefs:
        - name: prevention-point
          port: 80
