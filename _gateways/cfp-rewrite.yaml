apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: codeforphilly
  namespace: codeforphilly-rewrite-sandbox
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: codeforphilly-rewrite.codeforphilly.sandbox.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: codeforphilly-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: codeforphilly
  namespace: codeforphilly-rewrite-sandbox
spec:
  parentRefs:
    - name: codeforphilly
  hostnames:
    - codeforphilly-rewrite.codeforphilly.sandbox.k8s.phl.io
  rules:
    - backendRefs:
        - name: codeforphilly
          port: 80
