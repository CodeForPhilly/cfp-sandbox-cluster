apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: metabase
  namespace: metabase
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: metabase.sandbox.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: metabase-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: metabase
  namespace: metabase
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
    - name: metabase
  hostnames:
    - metabase.sandbox.k8s.phl.io
  rules:
    - backendRefs:
        - name: metabase
          port: 3000
