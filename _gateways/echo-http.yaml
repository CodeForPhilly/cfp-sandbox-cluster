apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: echo-http
  namespace: echo-http
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: echo-http.sandbox.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: echo-http-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-http
  namespace: echo-http
spec:
  parentRefs:
    - name: echo-http
  hostnames:
    - echo-http.sandbox.k8s.phl.io
  rules:
    - backendRefs:
        - name: echo-http
          port: 80
