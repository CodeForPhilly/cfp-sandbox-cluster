apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: sealed-secrets.sandbox.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: sealed-secrets-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
    - name: sealed-secrets
  hostnames:
    - sealed-secrets.sandbox.k8s.phl.io
  rules:
    - backendRefs:
        - name: sealed-secrets
          port: 8080
