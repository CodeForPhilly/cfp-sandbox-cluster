apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: balancer
  namespace: balancer
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: balancer.sandbox.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: balancer-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: balancer
  namespace: balancer
spec:
  parentRefs:
    - name: balancer
  hostnames:
    - balancer.sandbox.k8s.phl.io
  rules:
    - backendRefs:
        - name: balancer
          port: 8000
