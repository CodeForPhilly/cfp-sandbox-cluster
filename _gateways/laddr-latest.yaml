apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: latest
  namespace: laddr
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: latest.laddr.sandbox.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: latest-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: latest
  namespace: laddr
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
    - name: latest
  hostnames:
    - latest.laddr.sandbox.k8s.phl.io
  rules:
    - backendRefs:
        - name: latest-site
          port: 80
