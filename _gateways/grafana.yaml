apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: grafana
  namespace: grafana
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: metrics.sandbox.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: grafana-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: grafana
spec:
  parentRefs:
    - name: grafana
  hostnames:
    - metrics.sandbox.k8s.phl.io
  rules:
    - backendRefs:
        - name: grafana
          port: 80
