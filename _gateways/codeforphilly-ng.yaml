apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: codeforphilly
  namespace: codeforphilly-rewrite-sandbox
  annotations:
    # cert-manager watches Gateways with this annotation and creates a
    # Certificate that resolves into the listener's certificateRef Secret.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: next-v2.codeforphilly.org
      tls:
        mode: Terminate
        certificateRefs:
          - name: codeforphilly-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: codeforphilly
  namespace: codeforphilly-rewrite-sandbox
spec:
  parentRefs:
    - name: codeforphilly
  hostnames:
    - next-v2.codeforphilly.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: codeforphilly
          port: 80
