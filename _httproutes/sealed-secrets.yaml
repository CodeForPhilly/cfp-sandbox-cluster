apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - sealed-secrets.sandbox.k8s.phl.io
  rules:
    - backendRefs:
        - name: sealed-secrets
          port: 8080
