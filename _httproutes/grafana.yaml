apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: grafana
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - metrics.sandbox.k8s.phl.io
  rules:
    - backendRefs:
        - name: grafana
          port: 80
