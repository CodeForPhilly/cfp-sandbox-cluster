apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-http
  namespace: echo-http
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - echo-http.sandbox.k8s.phl.io
  rules:
    - backendRefs:
        - name: echo-http
          port: 80
