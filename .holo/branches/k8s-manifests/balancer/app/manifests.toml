[holomapping]
holosource = "balancer"
root = "deploy/manifests/balancer/base"
files = [
    "namespace.yaml",
    "deployment.yaml",
    "service.yaml",
]
# Excludes from balancer-main base/:
#   - kustomization.yaml — we compose our own at balancer/app/kustomization.yaml
#   - balancer.env — upstream ships empty; we provide our own with cnpg connection config
#   - gateway-listeners.yaml + httproute.yaml — replaced by per-cluster _gateways/balancer.yaml
#   - secret.template.yaml — informational only, not deployable
#   - ingress.yaml (if present in older revs) — superseded by Gateway API
